<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <!--login screen-->
  <div id="loginScreen" class="container">
    <h1 class="title">Quiz App</h1>
    <p class="subtitle">Ready to test your knowledge?</p>

    <label>Your Name</label>
    <input type="text" id="username" placeholder="Enter your name">

    <label>Select Subject</label>
    <select id="subject">
      <option value="">Choose a Subject...</option>
      <option value="python">Python</option>
      <option value="javascript">JavaScript</option>
      <option value="maths">Maths</option>
      <option value="english">English</option>
      <option value="french">French</option>
    </select>

    <button class="startButton" onclick="startQuiz()">Start Quiz</button>
  </div>


  <!--quiz screen-->
  <div id="quizScreen" class="container" style="display:none;">

    <div class="topBar">
        <div id="welcomeText"></div>
        <div id="timer"></div>
    </div>

    <div id="progress" class="progress-text"></div>

    <div class="progress-container">
        <div id="progressBar"></div>
    </div>


    <h2 id="question"></h2>
    <div id="options"></div>

    <div class="buttons">
      <button onclick="prevQuestion()">Previous</button>
      <button onclick="nextQuestion()">Next</button>
      <button onclick="submitQuiz()">Submit</button>
    </div>
  </div>


  <!--result screen-->
  <div id="resultScreen" class="container" style="display:none;"></div>

  <script src="app.js"></script>
</body>
</html>
